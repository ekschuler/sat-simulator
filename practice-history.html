<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Practice Progress | SAT Practice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; background:#f7f7f7; color:#222; font-family:'DM Sans',system-ui,sans-serif; visibility:hidden; }
    .nav { position:sticky; top:0; background:white; border-bottom:1px solid #e5e5e5; z-index:100; }
    .navInner { max-width:1100px; margin:0 auto; padding:16px 20px; display:flex; justify-content:space-between; align-items:center; gap:20px; flex-wrap:wrap; }
    .navBrand { font-weight:800; font-size:18px; text-decoration:none; color:#111; }
    .navLinks { display:flex; gap:18px; flex-wrap:wrap; align-items:center; }
    .navLinks a { text-decoration:none; color:#333; font-weight:600; }
    .navLinks a:hover { color:#4f46e5; }
    .appPage { max-width:900px; margin:40px auto; padding:0 20px 60px; }
    .appTitle { font-size:32px; font-weight:800; margin:0 0 8px; }
    .appSubtitle { color:#666; margin:0 0 28px; }
    .topActions { display:flex; gap:12px; margin-bottom:24px; flex-wrap:wrap; }
    .secondaryBtn { border:none; border-radius:10px; padding:12px 18px; font-size:15px; font-weight:700; cursor:pointer; background:white; color:#2563eb; border:1px solid #dbe6ff; }
    .secondaryBtn:hover { background:#eef4ff; }
    .primaryBtn { border:none; border-radius:10px; padding:12px 18px; font-size:15px; font-weight:700; cursor:pointer; background:#4f46e5; color:white; }
    .filterRow { display:flex; gap:8px; margin-bottom:24px; flex-wrap:wrap; }
    .filterPill { padding:6px 14px; border-radius:20px; border:1px solid #e5e7eb; background:white; font-size:13px; font-weight:600; cursor:pointer; color:#374151; }
    .filterPill.active { background:#4f46e5; color:white; border-color:#4f46e5; }

    /* Summary banner */
    .summaryBanner { background:white; border:1px solid #e5e7eb; border-radius:14px; padding:20px 24px; margin-bottom:24px; display:flex; gap:32px; flex-wrap:wrap; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
    .summaryBanner .stat { text-align:center; }
    .summaryBanner .statNum { font-size:28px; font-weight:800; color:#4f46e5; }
    .summaryBanner .statLabel { font-size:12px; font-weight:600; color:#6b7280; margin-top:2px; text-transform:uppercase; letter-spacing:0.05em; }

    /* Domain cards */
    .domainCard { background:white; border:1px solid #e5e7eb; border-radius:14px; padding:20px 24px; margin-bottom:16px; box-shadow:0 2px 8px rgba(0,0,0,0.03); }
    .domainHeader { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
    .domainName { font-size:11px; font-weight:700; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em; }
    .domainScore { font-size:13px; font-weight:600; color:#374151; }

    /* Topic rows */
    .topicRow { display:flex; align-items:center; gap:12px; padding:8px 0; border-bottom:1px solid #f9fafb; cursor:pointer; border-radius:6px; transition:background 0.1s; }
    .topicRow:hover { background:#f5f3ff; padding-left:8px; margin-left:-8px; }
    .topicRow:last-child { border-bottom:none; }
    .topicName { font-size:14px; color:#111; flex:1; min-width:0; }
    .topicBarWrap { width:120px; height:7px; background:#f0f0f0; border-radius:99px; overflow:hidden; flex-shrink:0; }
    .topicBar { height:100%; border-radius:99px; transition:width 0.4s ease; }
    .topicPct { font-size:13px; font-weight:700; color:#374151; width:36px; text-align:right; flex-shrink:0; }
    .topicFraction { font-size:12px; color:#9ca3af; width:48px; text-align:right; flex-shrink:0; }
    .topicArrow { font-size:12px; color:#c7d2fe; flex-shrink:0; }

    .emptyState { text-align:center; padding:60px 20px; color:#666; }
    .emptyState h2 { font-size:20px; margin-bottom:8px; color:#333; }
    #loadingState { text-align:center; padding:60px 20px; color:#666; }

    @media (max-width:600px) {
      .appTitle { font-size:24px; }
      .topicBarWrap { width:60px; }
      .summaryBanner { gap:16px; }
    }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="navInner">
      <a class="navBrand" href="dashboard.html">SAT Practice</a>
      <div class="navLinks">
        <a href="dashboard.html">Home</a>
        <a href="#" id="logoutBtn">Log Out</a>
      </div>
    </div>
  </nav>

  <div class="appPage">
    <h1 class="appTitle">Practice Progress</h1>
    <p class="appSubtitle">Your cumulative progress across all practice sessions.</p>

    <div class="topActions">
      <button class="secondaryBtn" onclick="window.location.href='dashboard.html'">← Home</button>
    </div>

    <div class="filterRow">
      <button class="filterPill active" onclick="setFilter('all', this)">All</button>
      <button class="filterPill" onclick="setFilter('math', this)">Math</button>
      <button class="filterPill" onclick="setFilter('verbal', this)">Reading & Writing</button>
    </div>

    <div id="loadingState">Loading progress...</div>
    <div id="progressContent" style="display:none;"></div>
    <div class="emptyState" id="emptyState" style="display:none;">
      <h2>No practice yet</h2>
      <p>Start a practice session to track your progress here.</p>
      <button class="primaryBtn" onclick="window.location.href='dashboard.html'">Go to Home</button>
    </div>
  </div>

  <div style="text-align:center;font-size:13px;color:#888;margin:40px 0 20px;">
    <div style="margin-bottom:6px;">SAT Practice</div>
    <div>
      <a href="terms.html" style="color:#666;text-decoration:none;margin:0 8px;">Terms</a>
      <a href="privacy.html" style="color:#666;text-decoration:none;margin:0 8px;">Privacy</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    let allMathQs = [];
    let allVerbalQs = [];
    let mergedMathAnswers = {};
    let mergedVerbalAnswers = {};
    let currentFilter = "all";

    (async () => {
      const { data } = await window.supabaseClient.auth.getSession();
      if (!data?.session?.user) { window.location.replace("index.html"); return; }
      document.body.style.visibility = "visible";
      init();
    })();

    document.getElementById("logoutBtn").addEventListener("click", async (e) => {
      e.preventDefault();
      await window.supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    function getDomain(skill) {
      if (!skill) return "Uncategorized";
      if (typeof skill === "string") return skill;
      return skill.domain || "Uncategorized";
    }
    function getTopic(skill) {
      if (!skill || typeof skill === "string") return "General";
      return skill.topic || "General";
    }

    function isCorrect(q, a) {
      if (!a) return false;
      if (q.type === "mcq") return a.value === q.answerIndex;
      if (q.type === "gridin") {
        const accepted = (q.answersAccepted || [String(q.answer)]).map(v => String(v).trim().toLowerCase());
        return accepted.includes(String(a.value || "").trim().toLowerCase());
      }
      return false;
    }

    function buildTree(questions, answers) {
      const tree = {};
      questions.forEach(q => {
        const a = answers[String(q.id)];
        if (!a) return;
        const domain = getDomain(q.skill);
        const topic = getTopic(q.skill);
        if (!tree[domain]) tree[domain] = {};
        if (!tree[domain][topic]) tree[domain][topic] = { correct:0, total:0 };
        tree[domain][topic].total++;
        if (isCorrect(q, a)) tree[domain][topic].correct++;
      });
      return tree;
    }

    function setFilter(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll(".filterPill").forEach(p => p.classList.remove("active"));
      btn.classList.add("active");
      renderProgress();
    }

    function renderProgress() {
      const content = document.getElementById("progressContent");

      const mathTree = buildTree(allMathQs, mergedMathAnswers);
      const verbalTree = buildTree(allVerbalQs, mergedVerbalAnswers);

      // Merge for "all" view
      const trees = {};
      if (currentFilter === "all" || currentFilter === "math") {
        Object.entries(mathTree).forEach(([d, t]) => { trees[d] = {...(trees[d]||{}), ...t}; });
      }
      if (currentFilter === "all" || currentFilter === "verbal") {
        Object.entries(verbalTree).forEach(([d, t]) => { trees[d] = {...(trees[d]||{}), ...t}; });
      }

      if (Object.keys(trees).length === 0) {
        content.style.display = "none";
        document.getElementById("emptyState").style.display = "block";
        return;
      }

      // Summary stats
      let totalCorrect = 0, totalAnswered = 0;
      Object.values(trees).forEach(topics => {
        Object.values(topics).forEach(s => {
          totalCorrect += s.correct;
          totalAnswered += s.total;
        });
      });
      const overallPct = totalAnswered ? Math.round(totalCorrect/totalAnswered*100) : 0;

      let html = `
        <div class="summaryBanner">
          <div class="stat"><div class="statNum">${totalAnswered}</div><div class="statLabel">Questions Answered</div></div>
          <div class="stat"><div class="statNum">${totalCorrect}</div><div class="statLabel">Correct</div></div>
          <div class="stat"><div class="statNum">${overallPct}%</div><div class="statLabel">Overall</div></div>
        </div>`;

      Object.entries(trees).forEach(([domain, topics]) => {
        const domainCorrect = Object.values(topics).reduce((a,s) => a+s.correct, 0);
        const domainTotal = Object.values(topics).reduce((a,s) => a+s.total, 0);
        const domainPct = domainTotal ? Math.round(domainCorrect/domainTotal*100) : 0;

        html += `<div class="domainCard">
          <div class="domainHeader">
            <span class="domainName">${domain}</span>
            <span class="domainScore">${domainCorrect}/${domainTotal} · ${domainPct}%</span>
          </div>`;

        Object.entries(topics).sort((a,b) => a[0].localeCompare(b[0])).forEach(([topic, stats]) => {
          const pct = stats.total ? Math.round(stats.correct/stats.total*100) : 0;
          const barColor = pct >= 80 ? "#22c55e" : pct >= 50 ? "#f59e0b" : "#ef4444";
          const subject = currentFilter === "verbal" ? "verbal" : 
                          (currentFilter === "math" ? "math" :
                          (Object.keys(mathTree).includes(domain) ? "math" : "verbal"));

          html += `
            <div class="topicRow" onclick="reviewTopic('${encodeURIComponent(topic)}', '${subject}')">
              <span class="topicName">${topic}</span>
              <div class="topicBarWrap"><div class="topicBar" style="width:${pct}%;background:${barColor};"></div></div>
              <span class="topicPct">${pct}%</span>
              <span class="topicFraction">${stats.correct}/${stats.total}</span>
              <span class="topicArrow">›</span>
            </div>`;
        });

        html += `</div>`;
      });

      content.innerHTML = html;
      content.style.display = "block";
      document.getElementById("emptyState").style.display = "none";
    }

    function reviewTopic(encodedTopic, subject) {
      const topic = decodeURIComponent(encodedTopic);
      window.location.href = `simulator.html?mode=practice&review=all&subject=${subject}&topic=${encodeURIComponent(topic)}`;
    }

    async function init() {
      const { data: userData } = await window.supabaseClient.auth.getUser();
      const user = userData?.user;
      if (!user) return;

      // Load question banks and sessions in parallel
      const [mathRes, verbalRes, sessionsRes] = await Promise.all([
        fetch("practice.json").then(r => r.json()).catch(() => ({questions:[]})),
        fetch("verbal-practice.json").then(r => r.json()).catch(() => ({questions:[]})),
        window.supabaseClient
          .from("practice_sessions")
          .select("answers, subject, status")
          .eq("user_id", user.id)
          .in("status", ["completed", "in_progress"])
      ]);

      document.getElementById("loadingState").style.display = "none";

      allMathQs = mathRes.questions || [];
      allVerbalQs = verbalRes.questions || [];

      const sessions = sessionsRes.data || [];

      if (sessions.length === 0) {
        document.getElementById("emptyState").style.display = "block";
        return;
      }

      // Merge all answers across sessions
      sessions.forEach(s => {
        if (s.subject === "verbal") {
          Object.assign(mergedVerbalAnswers, s.answers || {});
        } else {
          Object.assign(mergedMathAnswers, s.answers || {});
        }
      });

      renderProgress();
    }
  </script>
</body>
</html>
