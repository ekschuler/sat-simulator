    <div id="choices"></div>

    <div class="nav-buttons">
      <button id="prevBtn" onclick="prevQuestion()" disabled>Prev</button>
      <button id="flagBtn" onclick="toggleFlag()">Flag</button>
      <button id="nextBtn" onclick="nextQuestion()" disabled>Next</button>
      <button onclick="openQuestionMap()">Question Map</button>
      <button id="submitBtn" onclick="submitTest()" disabled>Submit</button>
    </div>
  </div>

  <div id="practiceSidebar" class="practice-sidebar"></div>

</div>
  <div id="calculatorDrawer" class="calculatorDrawer">
    <div class="calculatorDrawerHeader">
      <div class="calculatorTitle">Calculator</div>
      <button class="calculatorCloseBtn" onclick="closeCalculator()">Close</button>
    </div>
    <div class="calculatorDrawerBody">
  <iframe
    src="https://www.desmos.com/calculator"
    style="width:100%;height:100%;border:none;"
  ></iframe>
</div>
  </div>
</div>
<div id="questionMapModal" class="questionMapModal">
  <div class="questionMapPanel">
    <div class="questionMapHeader">
      <div>Question Map</div>
      <button onclick="closeQuestionMap()">Close</button>
    </div>

    <div id="questionMapGrid" class="questionMapGrid"></div>
  </div>
</div>
<script src="app.js"></script>
</body>
</html>
