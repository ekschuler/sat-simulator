<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SAT Math Simulator</title>

<style>
body{
  font-family:system-ui;
  margin:0;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  background:#f7f7f7;
}

.container{
  text-align:center;
  background:white;
  padding:50px;
  border-radius:12px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
  max-width:600px;
}

h1{
  margin-top:0;
}

.buttons{
  margin-top:30px;
  display:flex;
  gap:20px;
  justify-content:center;
}

button{
  padding:14px 24px;
  font-size:16px;
  border-radius:8px;
  border:none;
  cursor:pointer;
  background:#4f46e5;
  color:white;
}

button:hover{
  background:#4338ca;
}
</style>
</head>

<body>

<div class="container">

<h1>SAT Math Simulator</h1>

<p>
Practice SAT Math in a realistic testing environment.
</p>

<div class="buttons">

<button onclick="location.href='simulator.html?mode=test'">
Start Full Test
</button>

<button onclick="location.href='simulator.html?mode=practice'">
Practice Questions
</button>

</div>

</div>

</body>
</html>
