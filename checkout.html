<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Started — 2xMath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0f0f;
      --ink2: #3a3a3a;
      --ink3: #888;
      --bg: #fafaf8;
      --white: #ffffff;
      --accent: #2d5be3;
      --accent-dark: #1e3fb0;
      --accent-light: #eef2fd;
      --border: #e8e8e4;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* NAV */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      z-index: 100;
    }

    .nav-brand {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-brand span { color: var(--accent); }

    .nav-link {
      font-size: 14px;
      font-weight: 500;
      color: var(--ink2);
      text-decoration: none;
    }

    .nav-link:hover { color: var(--accent); }

    /* MAIN */
    .main {
      padding: 100px 24px 60px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
  background: white;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px;
  width: 440px;
  max-width: 100%;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 8px;
      text-align: center;
    }

    .card-sub {
      font-size: 15px;
      color: var(--ink3);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    /* TOGGLE */
    .toggle-row {
      display: flex;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
      gap: 4px;
    }

    .toggle-btn {
      flex: 1;
      min-width: 100px;
      padding: 10px;
      border: none;
      border-radius: 7px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--sans);
      background: transparent;
      color: var(--ink3);
      transition: background 0.15s, color 0.15s;
    }

    .toggle-btn.active {
      background: white;
      color: var(--ink);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* FORM */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .form-input {
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: var(--sans);
      color: var(--ink);
      background: white;
      transition: border-color 0.15s;
      outline: none;
    }

    .form-input:focus {
      border-color: var(--accent);
    }

    .form-input::placeholder {
      color: var(--ink3);
    }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--sans);
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--accent-dark); }

    .auth-status {
      margin-top: 12px;
      font-size: 14px;
      color: var(--ink2);
      text-align: center;
      min-height: 20px;
    }

    .auth-status.error { color: #dc2626; }
    .auth-status.success { color: #16a34a; }

    .divider {
      height: 1px;
      background: var(--border);
      margin: 24px 0;
    }

    .back-link {
      display: block;
      text-align: center;
      font-size: 14px;
      color: var(--ink3);
      text-decoration: none;
      margin-top: 20px;
    }

    .back-link:hover { color: var(--accent); }

    /* FOOTER */
    .footer {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--ink3);
    }

    .footer a {
      color: var(--ink3);
      text-decoration: none;
      margin: 0 8px;
    }

    .footer a:hover { color: var(--ink); }

    @media (max-width: 500px) {
      .card { padding: 28px 20px; }
      .main { padding: 88px 16px 40px; }
    }
  </style>
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script
    src="https://js.sentry-cdn.com/c281c8f423740b517681ff8bb058fe4d.min.js"
    crossorigin="anonymous"
  ></script>
</head>
<body>

  <!-- NAV -->
  <nav class="nav">
    <a class="nav-brand" href="index.html">2x<span>Math</span></a>
    <a class="nav-link" href="index.html">← Back</a>
  </nav>

  <!-- MAIN -->
  <div class="main">
    <div>
      <div class="card">

        <h1 class="card-title" id="cardTitle">Create your account</h1>
        <p class="card-sub" id="cardSub">Sign up to unlock full SAT Math &amp; Reading practice.</p>

        <!-- Toggle -->
        <div class="toggle-row">
          <button class="toggle-btn active" id="signUpToggle" type="button" onclick="setMode('signup')">Sign Up</button>
          <button class="toggle-btn" id="logInToggle" type="button" onclick="setMode('login')">Log In</button>
        </div>

        <!-- Form -->
        <div class="form-group">
          <input class="form-input" id="authEmail" type="email" placeholder="Email address" autocomplete="email">
          <input class="form-input" id="authPassword" type="password" placeholder="Password" autocomplete="current-password">
        </div>

        <button class="btn-primary" id="signUpBtn" type="button" style="display:none;">Create Account</button>
        <button class="btn-primary" id="logInBtn" type="button" style="display:none;">Log In</button>

        <p class="auth-status" id="authStatus"></p>

        <p id="forgotPasswordLink" style="display:none; text-align:center; margin-top:12px;">
          <a href="#" id="forgotPasswordBtn" style="font-size:14px; color:#888; text-decoration:none;">Forgot your password?</a>
        </p>

      </div>

      <a class="back-link" href="index.html">← Back to 2xMath</a>
    </div>
  </div>

  <!-- FOOTER -->
  <footer class="footer">
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="auth.js"></script>
  <script>
    let currentMode = 'signup';

    function setMode(mode) {
      currentMode = mode;
      const signUpToggle = document.getElementById('signUpToggle');
      const logInToggle = document.getElementById('logInToggle');
      const cardTitle = document.getElementById('cardTitle');
      const cardSub = document.getElementById('cardSub');
      const signUpBtn = document.getElementById('signUpBtn');
      const logInBtn = document.getElementById('logInBtn');
      const authPassword = document.getElementById('authPassword');

      if (mode === 'signup') {
        signUpToggle.classList.add('active');
        logInToggle.classList.remove('active');
        cardTitle.textContent = 'Create your account';
        cardSub.textContent = 'Sign up to unlock full SAT Math & Reading practice.';
        signUpBtn.style.display = 'block';
        logInBtn.style.display = 'none';
        authPassword.placeholder = 'Create a password';
        authPassword.autocomplete = 'new-password';
        const forgotLink = document.getElementById('forgotPasswordLink');
        if (forgotLink) forgotLink.style.display = 'none';
      } else {
        logInToggle.classList.add('active');
        signUpToggle.classList.remove('active');
        cardTitle.textContent = 'Welcome back';
        cardSub.textContent = 'Log in to continue your prep.';
        logInBtn.style.display = 'block';
        signUpBtn.style.display = 'none';
        authPassword.placeholder = 'Your password';
        authPassword.autocomplete = 'current-password';
        const forgotLink = document.getElementById('forgotPasswordLink');
        if (forgotLink) forgotLink.style.display = 'block';
      }

      document.getElementById('authStatus').textContent = '';
    }

    // Initialize — show sign up by default, or log in if ?login=1
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      if (params.get('login') === '1') {
        setMode('login');
      } else {
        setMode('signup');
      }
    });

    // Forgot password handler
    const forgotBtn = document.getElementById('forgotPasswordBtn');
    if (forgotBtn) {
      forgotBtn.addEventListener('click', async (e) => {
        e.preventDefault();
        const email = document.getElementById('authEmail').value.trim();
        const statusEl = document.getElementById('authStatus');
        if (!email) {
          statusEl.textContent = 'Enter your email address first.';
          return;
        }
        const { error } = await window.supabaseClient.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + '/reset-password.html'
        });
        if (error) {
          statusEl.textContent = 'Error: ' + error.message;
        } else {
          statusEl.textContent = 'Password reset email sent — check your inbox.';
        }
      });
    }

    // Redirect already-logged-in paid users
    window.addEventListener('load', async () => {
      const { data } = await window.supabaseClient.auth.getSession();
      if (!data.session) return;

      const { data: profile } = await window.supabaseClient
        .from('profiles')
        .select('access_status')
        .eq('id', data.session.user.id)
        .maybeSingle();

      if (profile?.access_status === 'paid') {
        window.location.href = 'dashboard.html';
      }
    });
  </script>

</body>
</html>
