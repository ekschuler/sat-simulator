  <div class="nav" style="width:100%;position:fixed;top:0;left:0;right:0;height:60px;background:white;border-bottom:1px solid #e5e5e5;display:flex;justify-content:space-between;align-items:center;padding:0 30px;box-sizing:border-box;z-index:1000;">

<p>
  Create an account or log in to continue.
</p>

    <div style="display:flex;flex-direction:column;gap:12px;max-width:320px;width:100%;margin:0 auto 20px;">
  <div id="checkoutAuthHeader" style="text-align:center;margin-bottom:4px;">

<input

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
<script src="supabase-config.js"></script>
<script>
  const subscribeBtn = document.getElementById("subscribeBtn");

async function getCheckoutAccessStatus() {
  const { data, error } = await window.supabaseClient.auth.getSession();

  if (error) {
    console.error("Failed to load checkout session:", error);
    return { session: null, accessStatus: "anonymous" };
  }

  if (!data.session) {
    return { session: null, accessStatus: "anonymous" };
  }

  const user = data.session.user;

  const { data: profile, error: profileError } = await window.supabaseClient
    .from("profiles")
    .select("access_status")
    .eq("id", user.id)
    .maybeSingle();

  if (profileError) {
    console.error("Failed to load checkout access status:", profileError);
    return { session: data.session, accessStatus: "demo" };
  }

  return {
    session: data.session,
    accessStatus: profile?.access_status || "demo"
  };
}
  window.addEventListener("load", async () => {
    console.log("CHECKOUT LOAD BLOCK RUNNING");
  const { session, accessStatus } = await getCheckoutAccessStatus();

  if (!session) {
    return;
  }

  if (accessStatus === "paid") {
  window.location.href = "dashboard.html";
  return;
}

const params = new URLSearchParams(window.location.search);
if (params.get("from") === "index") {
  return;
}

window.location.href = "index.html";
return;
});
  if (subscribeBtn) {
  subscribeBtn.addEventListener("click", async () => {
  const { session, accessStatus } = await getCheckoutAccessStatus();

  console.log("Checkout access lookup:", { session, accessStatus });

  if (!session) {
    alert("Account setup is required before payment.");
    return;
  }

  if (accessStatus === "paid") {
    window.location.href = "dashboard.html";
    return;
  }


const { data: result, error: functionError } =
  await window.supabaseClient.functions.invoke("quick-processor", {
    body: {}
  });

  console.log("Checkout function response:", result, functionError);

  if (functionError) {
    console.error("Checkout function failed:", functionError);
    alert("Could not start checkout.");
    return;
  }

  if (result?.url) {
    window.location.href = result.url;
  }
});
  }
</script>

<div style="width:100%;flex-basis:100%;margin-top:40px;text-align:center;font-size:13px;color:#888;">

<script>
window.addEventListener("load", async () => {
  const { data: authData } = await window.supabaseClient.auth.getUser();

  if (authData?.user) {
    document.getElementById("logoutBtn").style.display = "block";
  }

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await window.supabaseClient.auth.signOut();
    window.location.href = "index.html";
  });
});
</script>
