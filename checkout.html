<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Unlock Full Access</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background: #f7f7f7;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }

    .card {
      width: 100%;
      max-width: 620px;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.06);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      margin-bottom: 10px;
    }

    p {
      color: #666;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .btnRow {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .primaryBtn,
    .secondaryBtn {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .primaryBtn {
      background: #4f46e5;
      color: white;
    }

    .secondaryBtn {
      background: white;
      color: #333;
      border: 1px solid #e5e7eb;
    }
  </style>
  <script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <div style="display:flex;flex-direction:column;align-items:center;width:100%;">
  <div class="card">
    <h1>Unlock Full Access</h1>
    <p>
      Full SAT practice and full tests require a paid subscription.
      Demo mode is still free.
    </p>

    <div style="display:flex;flex-direction:column;gap:12px;max-width:320px;width:100%;margin:0 auto 20px;">
  <div id="checkoutAuthHeader" style="text-align:center;margin-bottom:4px;">
    <div style="font-size:20px;font-weight:800;color:#111;">Create your account</div>
    <div style="font-size:14px;color:#666;margin-top:4px;">
      New users create an account first. Existing users can log in below.
    </div>
  </div>

<input
  id="authEmail"
    type="email"
    placeholder="Email"
    style="padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;"
  >

  <input
  id="authPassword"
    type="password"
    placeholder="Password"
    style="padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;"
  >

  <div class="btnRow" style="margin-top:4px;">
    <button class="secondaryBtn authBtn" id="signUpBtn" type="button">Create Account</button>
    <button class="secondaryBtn authBtn" id="logInBtn" type="button">Log In</button>
  </div>

  <p id="authStatus" style="margin:0;color:#444;font-size:14px;"></p>
</div>

<div style="display:none;">
  <button id="subscribeBtn" type="button">Unlock Full Access</button>
</div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="auth.js"></script>
<script src="supabase-config.js"></script>
<script>
  const subscribeBtn = document.getElementById("subscribeBtn");
  window.addEventListener("load", async () => {
  const { data, error } = await window.supabaseClient.auth.getSession();

  if (error) {
    console.error("Failed to load checkout session on page load:", error);
    return;
  }

  if (data.session) {
    subscribeBtn.disabled = false;
    subscribeBtn.click();
  }
});

  subscribeBtn.addEventListener("click", async () => {
    const { data, error } = await window.supabaseClient.auth.getSession();

    console.log("Checkout session lookup:", { data, error });

    if (error) {
      console.error("Failed to load checkout session:", error);
      alert("Could not start checkout.");
      return;
    }

if (!data.session) {
  alert("Account setup is required before payment. We’ll fix this next.");
  return;
}

    const { data: result, error: functionError } =
  await window.supabaseClient.functions.invoke("quick-processor", {
    body: {}
  });

console.log("Checkout function response:", result, functionError);
if (functionError) {
  console.error("Checkout function failed:", functionError);
  alert("Could not start checkout.");
  return;
}

if (result?.url) {
  window.location.href = result.url;
}
  });
</script>

<div style="width:100%;flex-basis:100%;margin-top:40px;text-align:center;font-size:13px;color:#888;">
  <div style="margin-bottom:6px;">SAT Math Practice</div>

  <div style="margin-bottom:6px;">
    <a href="terms.html" style="color:#666;text-decoration:none;margin:0 8px;">Terms</a>
    <a href="privacy.html" style="color:#666;text-decoration:none;margin:0 8px;">Privacy</a>
  </div>
</div>

</div>
  </div>
</body>
</html>
