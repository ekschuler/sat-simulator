<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — 2xMath</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0f0f0f;
      --ink2: #3a3a3a;
      --ink3: #888;
      --bg: #fafaf8;
      --accent: #2d5be3;
      --accent-dark: #1e3fb0;
      --border: #e8e8e4;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'DM Sans', system-ui, sans-serif;
    }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 64px;
      background: rgba(250,250,248,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      z-index: 100;
    }

    .nav-brand {
      font-family: var(--serif);
      font-size: 22px;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.02em;
    }

    .nav-brand span { color: var(--accent); }

    .main {
      padding: 100px 24px 60px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      width: 440px;
      max-width: 100%;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 30px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 8px;
      text-align: center;
    }

    .card-sub {
      font-size: 15px;
      color: var(--ink3);
      text-align: center;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 20px;
    }

    .form-input {
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 15px;
      font-family: var(--sans);
      color: var(--ink);
      background: white;
      transition: border-color 0.15s;
      outline: none;
    }

    .form-input:focus { border-color: var(--accent); }
    .form-input::placeholder { color: var(--ink3); }

    .btn-primary {
      width: 100%;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--sans);
      transition: background 0.15s;
    }

    .btn-primary:hover { background: var(--accent-dark); }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }

    .status {
      margin-top: 12px;
      font-size: 14px;
      text-align: center;
      min-height: 20px;
      color: var(--ink2);
    }

    .status.error { color: #dc2626; }
    .status.success { color: #16a34a; }

    .back-link {
      display: block;
      text-align: center;
      font-size: 14px;
      color: var(--ink3);
      text-decoration: none;
      margin-top: 20px;
    }

    .back-link:hover { color: var(--accent); }

    .footer {
      padding: 24px;
      text-align: center;
      font-size: 13px;
      color: var(--ink3);
    }

    .footer a {
      color: var(--ink3);
      text-decoration: none;
      margin: 0 8px;
    }

    .footer a:hover { color: var(--ink); }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-brand" href="index.html">2x<span>Math</span></a>
  </nav>

  <div class="main">
    <div>
      <div class="card">
        <h1 class="card-title">Set new password</h1>
        <p class="card-sub">Enter a new password for your account.</p>

        <div class="form-group">
          <input class="form-input" id="newPassword" type="password" placeholder="New password" autocomplete="new-password">
          <input class="form-input" id="newPassword" type="password" placeholder="New password" autocomplete="new-password">
<p style="font-size:12px; color:#888; margin-top:-4px;">At least 6 characters</p>
          <input class="form-input" id="confirmPassword" type="password" placeholder="Confirm new password" autocomplete="new-password">
        </div>

        <button class="btn-primary" id="resetBtn" type="button">Update Password</button>
        <p class="status" id="resetStatus"></p>
      </div>

      <a class="back-link" href="checkout.html?login=1">← Back to Log In</a>
    </div>
  </div>

  <footer class="footer">
    <a href="terms.html">Terms</a>
    <a href="privacy.html">Privacy</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    const resetBtn = document.getElementById('resetBtn');
    const statusEl = document.getElementById('resetStatus');

    // Exchange the token from the URL hash for a session
    window.supabaseClient.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Session is now established, user can update password
        resetBtn.disabled = false;
      }
    });

    // Disable button until session is ready
    resetBtn.disabled = true;

    resetBtn.addEventListener('click', async () => {
      const newPassword = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();

      if (!newPassword || !confirmPassword) {
        statusEl.textContent = 'Please fill in both fields.';
        statusEl.className = 'status error';
        return;
      }

      if (newPassword !== confirmPassword) {
        statusEl.textContent = 'Passwords do not match.';
        statusEl.className = 'status error';
        return;
      }

      if (newPassword.length < 6) {
        statusEl.textContent = 'Password must be at least 6 characters.';
        statusEl.className = 'status error';
        return;
      }

      resetBtn.disabled = true;
      resetBtn.textContent = 'Updating...';

      const { error } = await window.supabaseClient.auth.updateUser({
        password: newPassword
      });

      if (error) {
        statusEl.textContent = 'Error: ' + error.message;
        statusEl.className = 'status error';
        resetBtn.disabled = false;
        resetBtn.textContent = 'Update Password';
        return;
      }

      statusEl.textContent = 'Password updated successfully! Redirecting...';
      statusEl.className = 'status success';

      setTimeout(() => {
        window.location.href = 'dashboard.html';
      }, 1500);
    });
  </script>

</body>
</html>
